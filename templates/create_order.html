{% extends "base.html" %}

{% block title %}Создать заявку{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Новая заявка на ремонт</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ваше имя *</label>
                            <input type="text" name="name" class="form-control" value="{{ current_user.name if current_user.is_authenticated else '' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Телефон *</label>
                            <input type="tel" name="phone" class="form-control" value="{{ current_user.phone if current_user.is_authenticated else '' }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email (для уведомлений)</label>
                        <input type="email" name="email" class="form-control" value="{{ current_user.email if current_user.is_authenticated else '' }}">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Модель устройства *</label>
                            <input type="text" name="model" class="form-control" placeholder="Например: iPhone 13" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Серийный номер (если есть)</label>
                            <input type="text" name="serial" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание проблемы *</label>
                        <textarea name="problem" class="form-control" rows="4" placeholder="Опишите, что случилось" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Фотографии устройства (до 3 шт.)</label>
                        <input type="file" name="photos" class="form-control" accept="image/*" multiple>
                        <small class="text-muted">Можно выбрать несколько файлов. Максимальный размер — 16 МБ.</small>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Отправить заявку</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
